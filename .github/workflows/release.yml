name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/token-throttle/
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump version, update README, push
        run: |
          uv sync --group dev
          uv run bump-my-version bump ${{ inputs.bump }}
          NEW_VERSION=$(python -c "import re; print(re.search(r'current_version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
          uv run python devtools/bump_readme_version.py "$NEW_VERSION"
          uv lock
          uv run ruff check --fix
          uv run ruff format
          if ! uv run ruff check; then
            echo "::error::ruff check found issues that --fix could not resolve"
            exit 1
          fi
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): update lockfile and formatting for v${NEW_VERSION}"
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after release commit:"
            git status --short
            exit 1
          fi
          git push --follow-tags
      - name: Build package
        run: uv build
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
