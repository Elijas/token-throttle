name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/token-throttle/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bump version, update README, push
        run: |
          uv sync --group dev
          uv run bump-my-version bump ${{ inputs.bump }}
          NEW_VERSION=$(python -c "import re; print(re.search(r'current_version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
          uv run python devtools/bump_readme_version.py "$NEW_VERSION"
          git add README.md
          git commit --amend --no-edit
          git push
      - name: Build package
        run: uv build
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
